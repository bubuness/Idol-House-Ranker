<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Idol House Ranker</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0b1f3a, #123a63, #2a6fa1);
      color: white;
    }

    .header {
      text-align: center;
      padding: 28px 20px 16px;
    }

    .logo {
      width: 120px;
      max-width: 40vw;
      margin-bottom: 12px;
      object-fit: contain;
    }

    h1 {
      margin: 0;
      font-size: 38px;
    }

    .subtitle {
      margin-top: 8px;
      color: #d7ecff;
      font-size: 16px;
    }

    .lineup-buttons {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .lineup-buttons button {
      background: rgba(255,255,255,0.18);
      border: none;
      padding: 8px 13px;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    .lineup-buttons button:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.26);
    }

    .lineup-buttons button.active {
      background: #58b8ff;
      color: #06253f;
    }

    .container {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
      padding: 20px;
      max-width: 1500px;
      margin: 0 auto;
    }

    .panel {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 18px;
    }

    .panel h2 {
      margin-top: 0;
      color: #8fd3ff;
      font-size: 24px;
    }

    .top-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .slot {
      background: rgba(255,255,255,0.10);
      padding: 12px;
      border-radius: 14px;
      min-height: 68px;
      display: flex;
      align-items: center;
    }

    .slot-left {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    .slot-number {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #8fd3ff;
      color: #08304f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      flex-shrink: 0;
      font-size: 18px;
    }

    .slot img {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .slot-name {
      font-size: 17px;
      font-weight: 600;
    }

    .empty {
      color: #d4e5f2;
      opacity: 0.8;
      font-style: italic;
    }

    .action-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .action-buttons button {
      border: none;
      border-radius: 12px;
      background: #2fa7ff;
      color: white;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(170px, 1fr));
      gap: 16px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 18px 12px;
      border-radius: 18px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      min-height: 210px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .card:hover {
      transform: translateY(-3px);
      background: rgba(255,255,255,0.12);
    }

    .card.selected {
      opacity: 0.45;
      pointer-events: none;
    }

    .card img {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 14px;
      border: 3px solid rgba(255,255,255,0.14);
    }

    .card-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .card-status {
      font-size: 14px;
      color: #d7ecff;
    }
  </style>
</head>
<body>

<div class="header">
  <img src="logo.png" alt="Idol House Logo" class="logo">
  <h1>Idol House Ranker</h1>
  <div class="subtitle">Top seçimini oluştur.</div>
  <div class="lineup-buttons" id="lineupButtons"></div>
</div>

<div class="container">
  <div class="panel">
    <h2 id="title">Top 5</h2>
    <div id="topList" class="top-list"></div>

    <div class="action-buttons">
      <button onclick="resetRanking()">Sıfırla</button>
      <button onclick="removeLast()">Son seçimi kaldır</button>
    </div>
  </div>

  <div class="panel">
    <h2>Stajyerler</h2>
    <div id="grid" class="grid"></div>
  </div>
</div>

<script>
let maxRank = 5;

const trainees = [
  {name:"Ahmet Emre", img:"ahmetemre.jpg"},
  {name:"Akın", img:"akin.jpg"},
  {name:"Alperen", img:"alperen.jpg"},
  {name:"Arda", img:"arda.jpg"},
  {name:"Arda Aykut", img:"ardaaykut.jpg"},
  {name:"Ayberk", img:"ayberk.jpg"},
  {name:"Barış", img:"baris.jpg"},
  {name:"Batu", img:"batu.jpg"},
  {name:"Bertuğ", img:"bertug.jpg"},
  {name:"Beytullah", img:"beytullah.jpg"},
  {name:"Civan", img:"civan.jpg"},
  {name:"Efe", img:"efe.jpg"},
  {name:"Ege", img:"ege.jpg"},
  {name:"Görkem", img:"gorkem.jpg"},
  {name:"Kemal", img:"kemal.jpg"},
  {name:"Milan", img:"milan.jpg"},
  {name:"Miraç", img:"mirac.jpg"},
  {name:"Oğuzhan", img:"oguzhan.jpg"},
  {name:"Umut Arda", img:"umutarda.jpg"},
  {name:"Yusif", img:"yusif.jpg"}
];

let ranking = [];

function renderButtons() {
  const container = document.getElementById("lineupButtons");
  container.innerHTML = "";

  for (let i = 5; i <= 9; i++) {
    const btn = document.createElement("button");
    btn.textContent = i;

    if (i === maxRank) btn.classList.add("active");

    btn.onclick = () => {
      maxRank = i;
      if (ranking.length > maxRank) ranking = ranking.slice(0, maxRank);
      renderAll();
    };

    container.appendChild(btn);
  }
}

function renderGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  trainees.forEach(t => {
    const selected = ranking.find(x => x.name === t.name);
    const div = document.createElement("div");
    div.className = selected ? "card selected" : "card";

    div.innerHTML = `
      <img src="${t.img}" alt="${t.name}">
      <div class="card-name">${t.name}</div>
      <div class="card-status">${selected ? "Seçildi" : "Eklemek için tıkla"}</div>
    `;

    if (!selected) div.onclick = () => select(t);

    grid.appendChild(div);
  });
}

function select(t) {
  if (ranking.length >= maxRank) return;
  if (ranking.find(x => x.name === t.name)) return;

  ranking.push(t);
  renderAll();
}

function updateTop() {
  const list = document.getElementById("topList");
  list.innerHTML = "";
  document.getElementById("title").textContent = `Top ${maxRank}`;

  for (let i = 0; i < maxRank; i++) {
    const div = document.createElement("div");
    div.className = "slot";

    if (ranking[i]) {
      div.innerHTML = `
        <div class="slot-left">
          <div class="slot-number">${i + 1}</div>
          <img src="${ranking[i].img}">
          <span class="slot-name">${ranking[i].name}</span>
        </div>
      `;
    } else {
      div.innerHTML = `
        <div class="slot-left">
          <div class="slot-number">${i + 1}</div>
          <span class="slot-name empty">Boş</span>
        </div>
      `;
    }

    list.appendChild(div);
  }
}

function resetRanking() {
  ranking = [];
  renderAll();
}

function removeLast() {
  ranking.pop();
  renderAll();
}

function renderAll() {
  renderButtons();
  renderGrid();
  updateTop();
}

renderAll();
</script>

</body>
</html>
