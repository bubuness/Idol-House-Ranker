<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idol House Ranker</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#0b1f3a,#123a63,#2a6fa1);
  color:white;
}

.header{
  text-align:center;
  padding:30px 20px;
}

.logo{
  width:120px;
  margin-bottom:10px;
}

h1{font-size:48px;margin:0;}
.subtitle{color:#d7ecff;margin-top:10px;}

.lineup-buttons{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:20px;
}

.lineup-buttons button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:#4d6f95;
  color:white;
  cursor:pointer;
}

.lineup-buttons button.active{
  background:#58b8ff;
  color:#06253f;
}

.container{
  display:grid;
  grid-template-columns:320px 1fr;
  gap:20px;
  padding:20px;
}

.panel{
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:18px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
}

.card{
  background:rgba(255,255,255,0.08);
  border-radius:16px;
  padding:16px;
  text-align:center;
  cursor:pointer;
}

.card img{
  width:95px;
  height:95px;
  border-radius:50%;
  object-fit:cover;
}

.card.selected{
  opacity:.45;
  pointer-events:none;
}

.slot{
  background:rgba(255,255,255,0.08);
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:10px;
}

.slot img{
  width:42px;
  height:42px;
  border-radius:50%;
  object-fit:cover;
}

button{
  cursor:pointer;
}
</style>
</head>
<body>

<div class="header">
  <img src="logo.png" class="logo">
  <h1>Idol House Ranker</h1>
  <div class="subtitle">Top seçimini oluştur.</div>
  <div id="lineupButtons" class="lineup-buttons"></div>
</div>

<div class="container">
  <div class="panel">
    <h2 id="title">Top 5</h2>
    <div id="topList"></div>
    <button onclick="resetRanking()">Sıfırla</button>
    <button onclick="removeLast()">Son seçimi kaldır</button>
  </div>

  <div class="panel">
    <h2>Stajyerler</h2>
    <div id="grid" class="grid"></div>
  </div>
</div>

<script>
let maxRank = 5;
let ranking = [];

const trainees = [
{name:"Ahmet Emre", img:"ahmetemre.jpg"},
{name:"Akın", img:"akin.jpg"},
{name:"Alperen", img:"alperen.jpg"},
{name:"Arda", img:"arda.jpg"},
{name:"Arda Aykut", img:"ardaaykut.jpg"},
{name:"Ayberk", img:"ayberk.jpg"},
{name:"Barış", img:"baris.jpg"},
{name:"Batu", img:"batu.jpg"},
{name:"Beytullah", img:"beytullah.jpg"},
{name:"Civan", img:"civan.jpg"},
{name:"Efe", img:"efe.jpg"},
{name:"Görkem", img:"gorkem.jpg"},
{name:"Kemal", img:"kemal.jpg"},
{name:"Milan", img:"milan.jpg"},
{name:"Miraç", img:"mirac.jpg"},
{name:"Oğuzhan", img:"oguzhan.jpg"},
{name:"Umut Arda", img:"umutarda.jpg"},
{name:"Yusif", img:"yusif.jpg"},
  
{name:"Bertuğ", img:"bertug.jpg"},
{name:"Ege", img:"ege.jpg"}
];

function renderButtons(){
  const box=document.getElementById("lineupButtons");
  box.innerHTML="";

  for(let i=5;i<=9;i++){
    const btn=document.createElement("button");
    btn.textContent=i;
    if(i===maxRank) btn.classList.add("active");

    btn.onclick=()=>{
      maxRank=i;
      if(ranking.length>maxRank){
        ranking=ranking.slice(0,maxRank);
      }
      renderAll();
    };

    box.appendChild(btn);
  }
}

function renderGrid(){
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  trainees.forEach(t=>{
    const selected=ranking.find(x=>x.name===t.name);

    const card=document.createElement("div");
    card.className=selected?"card selected":"card";

    card.innerHTML=`
      <img src="${t.img}" onerror="this.src='logo.png'">
      <h3>${t.name}</h3>
      <p>${selected ? "Seçildi" : "Eklemek için tıkla"}</p>
    `;

    if(!selected){
      card.onclick=()=>selectTrainee(t);
    }

    grid.appendChild(card);
  });
}

function selectTrainee(t){
  if(ranking.length>=maxRank) return;
  ranking.push(t);
  renderAll();
}

function updateTop(){
  const top=document.getElementById("topList");
  top.innerHTML="";
  document.getElementById("title").textContent=`Top ${maxRank}`;

  for(let i=0;i<maxRank;i++){
    const slot=document.createElement("div");
    slot.className="slot";

    if(ranking[i]){
      slot.innerHTML=`
        <strong>${i+1}</strong>
        <img src="${ranking[i].img}">
        <span>${ranking[i].name}</span>
      `;
    } else {
      slot.innerHTML=`<strong>${i+1}</strong> Boş`;
    }

    top.appendChild(slot);
  }
}

function resetRanking(){
  ranking=[];
  renderAll();
}

function removeLast(){
  ranking.pop();
  renderAll();
}

function renderAll(){
  renderButtons();
  renderGrid();
  updateTop();
}

renderAll();
</script>

</body>
</html>
